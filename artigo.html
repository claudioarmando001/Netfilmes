<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitura | CLD News</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Paleta Coesa com a Principal */
            --bg: #fdfdfc;
            --text: #111827;
            --primary: #047857;
            --surface: #f3f4f6;
            --border: #e5e7eb;
            --radius-lg: 20px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --text: #f3f4f6;
                --surface: #1e293b;
                --border: #334155;
            }
        }
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.6; }
        
        /* Header Minimalista */
        .header { 
            position: fixed; top: 0; width: 100%; 
            background: rgba(var(--bg), 0.9); 
            backdrop-filter: blur(12px); 
            padding: 15px 25px; 
            border-bottom: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 100; box-sizing: border-box; 
        }
        .back-btn { 
            text-decoration: none; 
            color: var(--text); 
            font-weight: 700; 
            display: flex; align-items: center; gap: 8px;
            font-size: 0.95rem;
            transition: color 0.2s;
        }
        .back-btn:hover { color: var(--primary); }
        .share-icon { cursor: pointer; color: var(--text-meta); font-size: 1.2rem; transition: color 0.2s; }
        .share-icon:hover { color: var(--text); }

        /* Content Container */
        .container { max-width: 740px; margin: 100px auto 0; padding: 20px; }
        
        .source-label { 
            color: var(--primary); 
            font-weight: 800; 
            text-transform: uppercase; 
            font-size: 0.8rem; 
            letter-spacing: 0.1em; 
            margin-bottom: 15px; 
            display: inline-block;
            background: rgba(4, 120, 87, 0.1);
            padding: 5px 12px;
            border-radius: 6px;
        }
        
        h1 { 
            font-size: 2.6rem; 
            line-height: 1.15; 
            font-weight: 800; 
            margin-bottom: 25px; 
            letter-spacing: -2px; 
            color: var(--text);
        }

        .btn-save { 
            border: 1px solid var(--border); 
            padding: 12px 24px; 
            border-radius: 100px; 
            font-weight: 700; 
            cursor: pointer; 
            background: var(--card); 
            color: var(--text); 
            font-family: inherit; 
            transition: all 0.2s ease; 
            margin-bottom: 40px; 
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }
        .btn-save:hover { background: var(--surface); }
        .btn-save.active { background: #facc15; color: #000; border-color: #facc15; }

        .main-img { width: 100%; border-radius: var(--radius-lg); margin-bottom: 40px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        
        /* Tipografia de Leitura (Lora) */
        .content { 
            font-family: 'Lora', serif; 
            font-size: 1.3rem; 
            line-height: 1.95; 
            color: var(--text); 
        }
        .content p { margin-bottom: 1.8rem; opacity: 0.97; }
        .content img { width: 100%; border-radius: 12px; margin: 30px 0; }
        .content h2, .content h3 { font-family: 'Plus Jakarta Sans', sans-serif; margin-top: 40px; margin-bottom: 15px; letter-spacing: -1px; }
        
        footer { margin-top: 80px; padding: 50px 0; text-align: center; border-top: 1px solid var(--border); font-size: 0.95rem; color: var(--text-meta); font-weight: 500; }
        
        @media (max-width: 600px) {
            h1 { font-size: 2rem; letter-spacing: -1px; }
            .content { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Voltar</a>
    <i class="fas fa-share-alt share-icon" onclick="share()"></i>
</div>

<main class="container">
    <div id="source-tag" class="source-label">Carregando...</div>
    <h1 id="title">...</h1>
    
    <button id="saveBtn" class="btn-save" onclick="toggleSave()">
        <i class="far fa-bookmark"></i> Guardar para ler depois
    </button>

    <img id="feat-img" class="main-img" style="display:none">
    
    <div id="content" class="content">
        </div>

    <footer>
        <p>CLD News Moçambique &copy; 2023</p>
        <p style="font-size: 0.8rem; margin-top: 5px;">A sua janela para a atualidade nacional.</p>
    </footer>
</main>

<script>
    // Mantenha o JavaScript original da Página de Leitura aqui.
    // Ele funcionará perfeitamente com a nova aparência.
    // [Inserir aqui o script da sua página de leitura original]
</script>
</body>
</html>
