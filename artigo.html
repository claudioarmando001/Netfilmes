<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lendo notícia | CLD</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #2563eb; --bg: #ffffff; --text: #0f172a; --surface: #f1f5f9; }
        @media (prefers-color-scheme: dark) { :root { --bg: #020617; --text: #f8fafc; --surface: #1e293b; } }
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        .header { position: fixed; top: 0; width: 100%; background: var(--bg); padding: 15px 20px; border-bottom: 1px solid var(--surface); display: flex; justify-content: space-between; z-index: 100; box-sizing: border-box; }
        
        .container { max-width: 800px; margin: 80px auto 0; padding: 20px; }
        .meta-top { color: var(--p); font-weight: 800; text-transform: uppercase; font-size: 0.8rem; margin-bottom: 10px; }
        h1 { font-size: 2rem; line-height: 1.2; font-weight: 800; margin-bottom: 20px; letter-spacing: -1px; }
        
        .action-bar { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 1px solid var(--surface); padding-bottom: 20px; }
        .btn { border: none; padding: 12px 24px; border-radius: 50px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; font-family: inherit; transition: 0.2s; }
        .btn-audio { background: var(--p); color: white; }
        .btn-save { background: var(--surface); color: var(--text); }
        .btn-save.active { background: #facc15; color: #000; }

        .main-img { width: 100%; border-radius: 20px; margin-bottom: 30px; aspect-ratio: 16/9; object-fit: cover; }
        
        .content { font-family: 'Lora', serif; font-size: 1.3rem; line-height: 1.8; color: var(--text); }
        .content p { margin-bottom: 1.5rem; }
        .content img { width: 100%; border-radius: 15px; margin: 20px 0; }
        
        .mini-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 40px; }
        .mini-card { text-decoration: none; color: inherit; background: var(--surface); padding: 10px; border-radius: 15px; }
        .mini-card img { width: 100%; height: 120px; border-radius: 10px; object-fit: cover; }
        .mini-card h4 { font-size: 0.9rem; margin-top: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html" style="text-decoration:none; color:var(--text); font-weight:700"><i class="fas fa-arrow-left"></i> Voltar</a>
    <i class="fas fa-share-alt" style="cursor:pointer" onclick="share()"></i>
</div>

<article class="container">
    <div id="source-tag" class="meta-top">Carregando...</div>
    <h1 id="title">...</h1>
    
    <div class="action-bar">
        <button id="voiceBtn" class="btn btn-audio" onclick="toggleSpeech()"><i class="fas fa-play"></i> Ouvir</button>
        <button id="saveBtn" class="btn btn-save" onclick="toggleSave()"><i class="far fa-bookmark"></i> Guardar</button>
    </div>

    <img id="feat-img" class="main-img" style="display:none">
    <div id="content" class="content"></div>
    
    <hr style="margin: 50px 0; border: 0; border-top: 1px solid var(--surface);">
    <h3>Relacionadas</h3>
    <div id="mini-feed" class="mini-grid"></div>
</article>

<script>
    const APIS = { 
        'opais': 'https://opais.co.mz/wp-json/wp/v2/posts/',
        'carta': 'https://cartamz.com/wp-json/wp/v2/posts/',
        'mznews': 'https://mznews.co.mz/wp-json/wp/v2/posts/',
        'folha': 'https://www.folhademaputo.co.mz/wp-json/wp/v2/posts/',
        'evidencias': 'https://evidencias.co.mz/wp-json/wp/v2/posts/',
        'mais': 'https://mais.co.mz/wp-json/wp/v2/posts/'
    };
    
    let currentPost = null, synth = window.speechSynthesis, isSpeaking = false;

    async function loadArticle() {
        const urlParams = new URLSearchParams(window.location.search);
        const src = urlParams.get('src'), id = urlParams.get('id');
        
        try {
            const res = await fetch(`${APIS[src]}${id}?_embed`);
            const p = await res.json();
            
            currentPost = {
                id: p.id, srcSlug: src, srcName: src.toUpperCase(),
                title: p.title.rendered,
                img: p._embedded?.['wp:featuredmedia']?.[0]?.source_url || '',
                link: location.href
            };

            document.getElementById('source-tag').innerText = src;
            document.getElementById('title').innerHTML = p.title.rendered;
            document.getElementById('content').innerHTML = p.content.rendered;
            
            if(currentPost.img) {
                const img = document.getElementById('feat-img');
                img.src = currentPost.img;
                img.style.display = 'block';
            }
            updateSaveStatus();
            loadRelated(src);
        } catch(e) { document.getElementById('title').innerText = "Erro ao carregar."; }
    }

    function toggleSave() {
        let saved = JSON.parse(localStorage.getItem('cld_saved') || '[]');
        const idx = saved.findIndex(x => x.id === currentPost.id);
        idx > -1 ? saved.splice(idx, 1) : saved.push(currentPost);
        localStorage.setItem('cld_saved', JSON.stringify(saved));
        updateSaveStatus();
    }

    function updateSaveStatus() {
        const saved = JSON.parse(localStorage.getItem('cld_saved') || '[]');
        const isSaved = saved.some(x => x.id === currentPost.id);
        const btn = document.getElementById('saveBtn');
        btn.classList.toggle('active', isSaved);
        btn.innerHTML = isSaved ? '<i class="fas fa-bookmark"></i> Guardado' : '<i class="far fa-bookmark"></i> Guardar';
    }

    async function loadRelated(src) {
        const res = await fetch(`${APIS[src]}?per_page=4&_embed`);
        const data = await res.json();
        document.getElementById('mini-feed').innerHTML = data.map(p => `
            <a href="artigo.html?id=${p.id}&src=${src}" class="mini-card">
                <img src="${p._embedded?.['wp:featuredmedia']?.[0]?.source_url || ''}">
                <h4>${p.title.rendered}</h4>
            </a>`).join('');
    }

    function toggleSpeech() {
        const btn = document.getElementById('voiceBtn');
        if (!isSpeaking) {
            const text = document.getElementById('content').innerText;
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'pt-PT';
            msg.onend = () => { isSpeaking = false; btn.innerHTML = '<i class="fas fa-play"></i> Ouvir'; };
            synth.speak(msg);
            isSpeaking = true;
            btn.innerHTML = '<i class="fas fa-stop"></i> Parar';
        } else { synth.cancel(); isSpeaking = false; btn.innerHTML = '<i class="fas fa-play"></i> Ouvir'; }
    }

    function share() { navigator.share({ title: currentPost.title, url: location.href }); }

    window.onload = loadArticle;
    window.onbeforeunload = () => synth.cancel();
</script>
</body>
</html>
