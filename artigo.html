<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitura | CLD News</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #fdfdfc; --text: #111827; --primary: #047857; --surface: #f3f4f6; --border: #e5e7eb; }
        @media (prefers-color-scheme: dark) { :root { --bg: #0f172a; --text: #f3f4f6; --surface: #1e293b; --border: #334155; } }
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.6; }
        .header { position: fixed; top: 0; width: 100%; background: rgba(var(--bg), 0.9); backdrop-filter: blur(12px); padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 100; box-sizing: border-box; }
        .back-btn { text-decoration: none; color: var(--text); font-weight: 700; display: flex; align-items: center; gap: 8px; }

        .container { max-width: 740px; margin: 100px auto 0; padding: 20px; }
        .source-label { color: var(--primary); font-weight: 800; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.1em; margin-bottom: 15px; display: inline-block; background: rgba(4, 120, 87, 0.1); padding: 5px 12px; border-radius: 6px; }
        
        h1 { font-size: 2.4rem; line-height: 1.15; font-weight: 800; margin-bottom: 25px; letter-spacing: -1.5px; }
        .btn-save { border: 1px solid var(--border); padding: 12px 24px; border-radius: 100px; font-weight: 700; cursor: pointer; background: var(--bg); color: var(--text); font-family: inherit; transition: 0.2s; margin-bottom: 40px; }
        .btn-save.active { background: #facc15; color: #000; border-color: #facc15; }

        .main-img { width: 100%; border-radius: 16px; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .content { font-family: 'Lora', serif; font-size: 1.3rem; line-height: 1.95; color: var(--text); }
        .content p { margin-bottom: 1.8rem; }
        .content img { width: 100%; border-radius: 12px; margin: 20px 0; }
        
        footer { margin-top: 80px; padding: 40px 0; text-align: center; border-top: 1px solid var(--border); font-size: 0.9rem; color: var(--text-meta); }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Voltar</a>
    <i class="fas fa-share-alt" style="cursor:pointer" onclick="share()"></i>
</div>

<main class="container">
    <div id="source-tag" class="source-label">...</div>
    <h1 id="title">...</h1>
    
    <button id="saveBtn" class="btn-save" onclick="toggleSave()"><i class="far fa-bookmark"></i> Guardar para ler depois</button>

    <img id="feat-img" class="main-img" style="display:none">
    <div id="content" class="content"></div>

    <footer>
        <p>CLD News | Moçambique Atualizado</p>
    </footer>
</main>

<script>
    const APIS = { 
        'opais': 'https://opais.co.mz/wp-json/wp/v2/posts/', 
        'carta': 'https://cartamz.com/wp-json/wp/v2/posts/', 
        'mznews': 'https://mznews.co.mz/wp-json/wp/v2/posts/',
        'folha': 'https://www.folhademaputo.co.mz/wp-json/wp/v2/posts/',
        'evidencias': 'https://evidencias.co.mz/wp-json/wp/v2/posts/',
        'integrity': 'https://integritymag.co.mz/wp-json/wp/v2/posts/',
        'mais': 'https://mais.co.mz/wp-json/wp/v2/posts/'
    };
    let currentPost = null;

    async function loadArticle() {
        const urlParams = new URLSearchParams(window.location.search);
        const src = urlParams.get('src'), id = urlParams.get('id');
        
        try {
            const res = await fetch(`${APIS[src]}${id}?_embed`);
            const p = await res.json();
            
            currentPost = { id: p.id, title: p.title.rendered, srcSlug: src, link: location.href };

            document.getElementById('source-tag').innerText = src.toUpperCase();
            document.getElementById('title').innerHTML = p.title.rendered;
            document.getElementById('content').innerHTML = p.content.rendered;
            
            const imgUrl = p._embedded?.['wp:featuredmedia']?.[0]?.source_url;
            if(imgUrl) {
                const img = document.getElementById('feat-img');
                img.src = imgUrl;
                img.style.display = 'block';
            }
            updateSaveBtn();
        } catch(e) { document.getElementById('title').innerText = "Erro ao carregar conteúdo."; }
    }

    function toggleSave() {
        let saved = JSON.parse(localStorage.getItem('cld_saved') || '[]');
        const idx = saved.findIndex(x => x.id === currentPost.id);
        idx > -1 ? saved.splice(idx, 1) : saved.push(currentPost);
        localStorage.setItem('cld_saved', JSON.stringify(saved));
        updateSaveBtn();
    }

    function updateSaveBtn() {
        const saved = JSON.parse(localStorage.getItem('cld_saved') || '[]');
        const isSaved = saved.some(x => x.id === currentPost.id);
        const btn = document.getElementById('saveBtn');
        btn.classList.toggle('active', isSaved);
        btn.innerHTML = isSaved ? '<i class="fas fa-bookmark"></i> Guardada' : '<i class="far fa-bookmark"></i> Guardar para ler depois';
    }

    function share() { navigator.share({ title: currentPost.title, url: location.href }); }
    window.onload = loadArticle;
</script>
</body>
</html>
