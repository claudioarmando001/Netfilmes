<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitura | CLD</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --p: #2563eb; 
            --bg: #ffffff; 
            --text: #0f172a; 
            --surface: #f8fafc;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #020617;
                --text: #f1f5f9;
                --surface: #0f172a;
            }
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            line-height: 1.6;
        }

        .header { 
            position: fixed; top: 0; width: 100%; 
            background: rgba(var(--bg), 0.9); 
            backdrop-filter: blur(10px);
            padding: 15px 20px; border-bottom: 1px solid rgba(0,0,0,0.05); 
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; box-sizing: border-box; 
        }

        .container { max-width: 720px; margin: 80px auto 0; padding: 20px; }

        h1 { font-size: 2.2rem; line-height: 1.1; font-weight: 800; margin-bottom: 24px; letter-spacing: -1px; }

        .controls { display: flex; gap: 12px; margin-bottom: 30px; }
        
        .btn { 
            border: none; padding: 10px 20px; border-radius: 100px; 
            font-weight: 700; cursor: pointer; display: flex; 
            align-items: center; gap: 8px; font-family: inherit; 
            font-size: 0.9rem; transition: 0.3s;
        }
        
        .btn-audio { background: var(--p); color: white; box-shadow: 0 4px 14px rgba(37,99,235,0.4); }
        .btn-audio.playing { background: #ef4444; }
        
        .btn-save { background: var(--surface); color: var(--text); border: 1px solid rgba(0,0,0,0.05); }
        .btn-save.active { background: #facc15; color: #000; border-color: #facc15; }

        .main-img { width: 100%; border-radius: 24px; margin-bottom: 30px; box-shadow: 0 20px 40px -10px rgba(0,0,0,0.1); }

        .body-text { 
            font-family: 'Lora', serif; 
            font-size: 1.25rem; 
            line-height: 1.9; 
            color: var(--text);
            opacity: 0.9;
        }
        
        .body-text p { margin-bottom: 1.5rem; }
        .body-text img { width: 100%; border-radius: 18px; margin: 25px 0; }

        /* Rodapé de sugestões */
        .mini-agregador { 
            margin-top: 60px; padding: 40px 20px; 
            background: var(--surface); border-radius: 32px 32px 0 0;
        }
        .mini-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 24px; }
        
        .mini-card { 
            display: flex; gap: 16px; text-decoration: none; 
            color: inherit; align-items: center; background: var(--bg);
            padding: 12px; border-radius: 20px;
        }
        .mini-card img { width: 70px; height: 70px; border-radius: 14px; object-fit: cover; }
        .mini-card h4 { font-size: 0.95rem; font-weight: 700; line-height: 1.3; }

        @media (max-width: 600px) {
            h1 { font-size: 1.7rem; }
            .body-text { font-size: 1.15rem; }
        }
    </style>
</head>
<body>
    </body>
</html>
