<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Camuflado Ultra</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* Estilizando a div para parecer um link ou botão */
        .link-disfarçado {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background-color: #25d366; /* Cor estilo WhatsApp */
            color: white;
            font-weight: bold;
            text-decoration: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            user-select: none;
        }

        .link-disfarçado:hover {
            background-color: #128c7e;
            transform: scale(1.05);
        }

        .link-disfarçado:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Área de Download</h2>
        <p>Clique no botão abaixo para acessar o arquivo oculto.</p>
        
        <div id="btn-redirect" class="link-disfarçado" data-hash="aHR0cHM6Ly93d3cuZ29vZ2xlLmNvbQ==">
            Baixar Arquivo Agora
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const botao = document.getElementById('btn-redirect');

            botao.addEventListener('click', function() {
                // Pega o código ofuscado
                const hash = this.getAttribute('data-hash');
                
                // Decodifica o Base64 para a URL real
                const urlReal = atob(hash);
                
                // Redireciona o usuário
                window.location.href = urlReal;
            });

            // Remove qualquer rastro no console ou status bar ao passar o mouse
            botao.addEventListener('mouseover', () => {
                window.status = "";
            });
        });
    </script>

</body>
</html>
