<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLD News | O seu agregador de notícias de Moçambique</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Nova Paleta de Cores Premium (Modo Claro) */
            --primary: #047857; /* Verde Esmeralda */
            --primary-dark: #065f46;
            --bg: #fdfdfc; /* Off-white suave */
            --card: #ffffff;
            --text: #111827; /* Cinza quase preto */
            --text-meta: #6b7280;
            --border: #e5e7eb;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a; /* Slate escuro */
                --card: #1e293b;
                --text: #f3f4f6;
                --text-meta: #9ca3af;
                --border: #334155;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            padding-bottom: 40px;
            letter-spacing: -0.01em;
        }
        
        /* Navbar Moderna com Efeito de Vidro */
        .navbar { 
            position: sticky; 
            top: 0; 
            background: rgba(var(--bg), 0.85); 
            backdrop-filter: blur(15px) saturate(180%); 
            -webkit-backdrop-filter: blur(15px) saturate(180%); 
            z-index: 1000; 
            padding: 14px 20px; 
            border-bottom: 1px solid var(--border);
        }
        
        .nav-top { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        
        .logo { 
            font-weight: 800; 
            font-size: 1.6rem; 
            color: var(--text); 
            text-decoration: none; 
            letter-spacing: -1.5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .logo::before {
            content: '';
            display: block;
            width: 12px;
            height: 24px;
            background: var(--primary);
            border-radius: 4px;
        }
        
        .btn-saved {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-saved:hover { background: var(--border); }
        .btn-saved.active { background: var(--primary); color: white; border-color: var(--primary); }

        .search-bar { margin: 16px auto; max-width: 800px; position: relative; }
        .search-bar input { 
            width: 100%; 
            padding: 14px 18px 14px 48px; 
            border-radius: var(--radius-md); 
            border: 1px solid var(--border); 
            background: var(--card); 
            color: var(--text); 
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s;
            box-shadow: var(--shadow-sm);
        }
        .search-bar input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(4, 120, 87, 0.1);
        }
        .search-bar i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-meta); font-size: 1.1rem; }

        /* Categorias Estilo "Pill" */
        .categories { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0 5px; scrollbar-width: none; max-width: 1200px; margin: 0 auto; }
        .categories::-webkit-scrollbar { display: none; }
        .cat-item { 
            padding: 10px 20px; 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 100px; 
            font-size: 0.85rem; 
            font-weight: 700; 
            color: var(--text); 
            white-space: nowrap; 
            cursor: pointer; 
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }
        .cat-item:hover { border-color: var(--text-meta); }
        .cat-item.active { background: var(--text); color: var(--bg); border-color: var(--text); }

        /* Feed Estilo Editorial */
        .feed { padding: 20px; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        
        .news-card { 
            display: flex; 
            flex-direction: column; 
            background: var(--card); 
            border-radius: var(--radius-lg); 
            border: 1px solid var(--border); 
            text-decoration: none; 
            color: inherit; 
            overflow: hidden; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-sm);
        }
        .news-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border-color: transparent;
        }
        
        .news-img { width: 100%; height: 210px; object-fit: cover; background: var(--border); }
        
        .news-body { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; }
        
        .news-tag { 
            font-size: 0.75rem; 
            font-weight: 800; 
            color: var(--primary); 
            text-transform: uppercase; 
            margin-bottom: 10px; 
            letter-spacing: 0.05em;
        }
        
        .news-title { 
            font-size: 1.15rem; 
            font-weight: 700; 
            line-height: 1.35; 
            margin-bottom: 15px; 
            display: -webkit-box; 
            -webkit-line-clamp: 3; 
            -webkit-box-orient: vertical; 
            overflow: hidden; 
            color: var(--text);
        }
        
        .news-meta { 
            font-size: 0.8rem; 
            color: var(--text-meta); 
            margin-top: auto; 
            font-weight: 500;
            display: flex;
            justify-content: space-between;
        }

        .loader { text-align: center; padding: 50px; grid-column: 1/-1; color: var(--primary); font-size: 1.8rem; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-top">
        <a href="index.html" class="logo">CLD News</a>
        <button id="bookmark-btn" class="btn-saved" onclick="toggleSavedView()">
            <i class="far fa-bookmark"></i> Salvos
        </button>
    </div>
    <div class="search-bar">
        <i class="fas fa-search"></i>
        <input type="text" id="search-input" placeholder="Pesquisar notícias de Moçambique..." onkeyup="if(event.key==='Enter') resetAndLoad()">
    </div>
    <div class="categories">
        <div class="cat-item active" onclick="filterCat('', this)">Tudo</div>
        <div class="cat-item" onclick="filterCat('política', this)">Política</div>
        <div class="cat-item" onclick="filterCat('economia', this)">Economia</div>
        <div class="cat-item" onclick="filterCat('sociedade', this)">Sociedade</div>
        <div class="cat-item" onclick="filterCat('desporto', this)">Desporto</div>
    </div>
</nav>

<main class="feed" id="feed"></main>
<div id="scroll-anchor" class="loader"><i class="fas fa-circle-notch fa-spin"></i></div>

<script>
    // Mantenha o JavaScript original da Página Principal aqui.
    // Ele funcionará perfeitamente com a nova aparência.

</script>
</body>
</html>
