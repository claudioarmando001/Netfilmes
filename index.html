<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLD News | Premium Feed</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --text-meta: #64748b;
            --border: #f1f5f9;
            --radius: 24px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #020617;
                --card: #0f172a;
                --text: #f8fafc;
                --text-meta: #94a3b8;
                --border: #1e293b;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            padding-bottom: 50px;
            transition: background 0.3s ease;
        }

        /* Navbar Glassmorphism */
        .navbar { 
            position: sticky; 
            top: 0; 
            background: rgba(var(--bg), 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 1000; 
            padding: 16px; 
            border-bottom: 1px solid var(--border);
        }

        .nav-top { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .logo { font-weight: 800; font-size: 1.5rem; color: var(--text); text-decoration: none; letter-spacing: -0.5px; }
        .logo span { color: var(--primary); }

        .btn-icon { 
            width: 42px; height: 42px; border-radius: 50%; 
            background: var(--border); color: var(--text); 
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: none; transition: 0.2s;
        }
        .btn-icon.active { background: var(--primary); color: white; }

        .search-bar { margin: 16px auto 0; max-width: 800px; position: relative; }
        .search-bar input { 
            width: 100%; padding: 14px 48px; border-radius: 16px; 
            border: 1px solid var(--border); background: var(--card); 
            color: var(--text); font-family: inherit; font-weight: 500;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .search-bar i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-meta); }

        .categories { display: flex; gap: 10px; overflow-x: auto; padding: 20px 0; max-width: 1200px; margin: 0 auto; }
        .categories::-webkit-scrollbar { display: none; }
        .cat-item { 
            padding: 10px 22px; background: var(--card); border: 1px solid var(--border); 
            border-radius: 100px; font-size: 0.85rem; font-weight: 600; 
            color: var(--text-meta); white-space: nowrap; cursor: pointer; transition: 0.3s;
        }
        .cat-item.active { background: var(--text); color: var(--bg); border-color: var(--text); }

        /* News Cards */
        .feed { padding: 0 16px; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr; gap: 20px; }
        
        .news-card { 
            display: flex; gap: 16px; background: var(--card); padding: 16px; 
            border-radius: var(--radius); border: 1px solid var(--border); 
            text-decoration: none; color: inherit; transition: transform 0.2s, box-shadow 0.2s;
        }
        .news-card:active { transform: scale(0.98); }

        .news-card.featured { 
            grid-column: 1 / -1; flex-direction: column; padding: 0; 
            overflow: hidden; border: none; background: var(--card);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }
        .news-card.featured .news-img { width: 100%; height: 260px; border-radius: 0; }
        .news-card.featured .news-content { padding: 20px; }
        .news-card.featured .news-title { font-size: 1.4rem; margin: 8px 0; }

        .news-img { width: 110px; height: 110px; border-radius: 18px; object-fit: cover; flex-shrink: 0; }
        .news-content { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .news-tag { font-size: 0.7rem; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; }
        .news-title { font-size: 1rem; font-weight: 700; line-height: 1.4; margin: 6px 0; }
        .news-meta { font-size: 0.75rem; color: var(--text-meta); font-weight: 500; }

        .loading-trigger { text-align: center; padding: 40px; grid-column: 1/-1; color: var(--primary); font-size: 1.5rem; }

        @media (min-width: 768px) { .feed { grid-template-columns: repeat(2, 1fr); gap: 24px; } }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-top">
        <a href="index.html" class="logo">CLD<span>News</span></a>
        <button id="bookmark-nav" class="btn-icon" onclick="toggleSavedView()"><i class="far fa-bookmark"></i></button>
    </div>
    <div class="search-bar">
        <i class="fas fa-search"></i>
        <input type="text" id="search-input" placeholder="O que pretende ler hoje?" onkeyup="if(event.key==='Enter') resetAndLoad()">
    </div>
    <div class="categories">
        <div class="cat-item active" onclick="filterCat('', this)">Recentíssimas</div>
        <div class="cat-item" onclick="filterCat('1', this)">Política</div>
        <div class="cat-item" onclick="filterCat('13', this)">Economia</div>
        <div class="cat-item" onclick="filterCat('18', this)">Desporto</div>
    </div>
</nav>

<main class="feed" id="feed"></main>
<div id="scroll-anchor" class="loading-trigger"><i class="fas fa-circle-notch fa-spin"></i></div>

<script>
    // Mantenha seu JavaScript original aqui, ele funcionará perfeitamente com o novo visual.
    // [Inserir aqui o script da sua página principal original]
</script>
</body>
</html>
